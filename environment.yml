name: aadp
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pytorch>=2.2.0
  - torchvision>=0.17.0
  - pytorch-cuda=12.1
  - pip

  - pip:
    - transformers>=4.40.0
    - timm>=0.9.0
    - einops>=0.7.0
    - SimpleITK>=2.3.0
    - nibabel>=5.2.0
    - pydicom>=2.4.0
    - monai>=1.3.0
    - numpy>=1.26.0
    - scipy>=1.12.0
    - pandas>=2.2.0
    - scikit-learn>=1.4.0
    - radgraph>=0.1.0
    - nltk>=3.8.0
    - matplotlib>=3.8.0
    - seaborn>=0.13.0
    - tqdm>=4.66.0
    - wandb>=0.16.0
    - pyyaml>=6.0.0
    - pytest>=8.0.0
    - setuptools>=69.0.0
    - -e .
