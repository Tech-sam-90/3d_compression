experiment_name: ctclip_stage2
projector: ctclip_stage2

# CT-CLIP feature dimensions (fixed — do not change)
ctclip_dim: 512
max_depth: 24
ctclip_tokens_per_slice: 576   # 24 * 24

# Stage 2 architecture
embed_dim: 512
num_tokens: 64          # M — default VTCB budget; override with --set for sweep
num_heads: 8
cond_dim: 2048
use_film: true
dropout: 0.0

# LLM
llm_model_name: facebook/opt-1.3b
llm_frozen: false
llm_lora:
  enabled: true
  r: 16
  alpha: 32
  target_modules: ["q_proj", "v_proj"]
  dropout: 0.05

instruction_encoder_model: facebook/opt-1.3b

# Training
device: cuda
mixed_precision: true
num_epochs: 5
batch_size: 8
gradient_accumulation_steps: 4    # effective batch = 32
max_grad_norm: 1.0
learning_rate: 1.0e-4
weight_decay: 0.0
warmup_steps: 500
val_every_n_steps: 500
save_every_n_steps: 1000
checkpoint_dir: checkpoints/ctclip_stage2/
patience: 5
use_wandb: true
use_attn_loss: false

# Tasks — T4 excluded (RadGenome unavailable)
tasks: ["T1", "T2", "T3"]
task_weights:
  T1: 0.6
  T2: 0.3
  T3: 0.1

# Data paths — FILL THESE IN before running
features_train_dir: /path/to/ctrate_features/train
features_valid_dir: /path/to/ctrate_features/valid
ctrate_csv_train: /path/to/CT-RATE/train_reports.csv
ctrate_csv_valid: /path/to/CT-RATE/validation_reports.csv

max_samples: null
hf_token: null

# VTCB sweep values (used by scripts/vtcb_sweep_ctclip.py)
vtcb_budgets: [16, 32, 64, 128, 256, 512]
